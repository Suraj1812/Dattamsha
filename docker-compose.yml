services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: dattamsha
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dattamsha"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/dattamsha
      ENVIRONMENT: dev
      REQUIRE_API_KEY: "true"
      API_KEY: local-dev-key
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
        VITE_API_KEY: local-dev-key
        VITE_DEFAULT_EMPLOYEE_ID: 1
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pg_data:
